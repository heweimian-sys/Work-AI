# 复制为 config.yaml 后填写。config.yaml 包含个人资源标识，不提交到 Git。
documents:
  log: ""
  notes: ""
  report: ""
  report_ref: ""

ddl_watch:
  - keyword: "示例任务"
    ddl: "2026-12-31"
    msg: "示例任务距离截止日期还有 {days}"

